# neoclaw configuration example. Copy to ./neoclaw.yaml (project-local) or
# ~/.config/neoclaw/config.yaml (user-global); the project-local file wins.

model:
  # HuggingFace model ID — TransformerCPP's HubClient downloads GGUF on
  # first run into ~/.cache/transformercpp/. Common options:
  #
  #   unsloth/gemma-4-E4B-it-GGUF      # Google Gemma 4 8B instruct
  #   unsloth/gemma-4-E2B-it-GGUF      # Smaller, faster
  #   Qwen/Qwen2.5-Coder-7B-Instruct-GGUF
  #   TheBloke/deepseek-coder-6.7B-instruct-GGUF
  id: unsloth/gemma-4-E4B-it-GGUF

  # Specific GGUF file inside the repo. If omitted, HubClient auto-picks
  # the "best" quant (prefers Q4_K_M).
  filename: gemma-4-E4B-it-Q4_K_M.gguf

server:
  # If auto_spawn=true, neoclaw will start a TransformerCPP http_server_demo
  # subprocess on the configured port. If false, expects an already-running
  # server at the endpoint (useful when you manage the inference server
  # separately — e.g. a persistent model across many neoclaw sessions).
  auto_spawn: true
  port: 8090
  endpoint: http://localhost:8090

agent:
  # Appended to the tool-protocol prompt before every turn. Use this to set
  # project-specific context: which language, testing framework, style rules.
  system_prompt: |
    You are a concise coding assistant. You work on the project in the
    current working directory. Prefer small diffs, explain what you are
    about to do, and ask for confirmation before any destructive change.

  # Maximum agent iterations per user turn. Stops tool-call loops from
  # running away on a broken model.
  max_iterations: 12

tools:
  # Always-on, safe tools.
  read_file:   true
  write_file:  true
  grep:        true
  glob:        true

  # Bash is gated. Default: disabled. Enable under sandbox and with caution.
  bash:
    enabled: false
    # Sandbox backend. "bwrap" (Linux only) mounts the project dir read-write
    # and everything else read-only, unshares the network by default, and
    # kills the child on parent exit. "none" disables sandboxing (do not
    # use for untrusted workloads). "opensandbox" hook is reserved for a
    # future integration with Alibaba OpenSandbox.
    sandbox: bwrap
    timeout_sec: 30
    allow_network: false

session:
  # Project root neoclaw considers its working context. Paths from tools
  # (read_file, write_file, ...) are resolved relative to this and must
  # stay inside it. "." resolves to the directory where neoclaw was
  # invoked.
  project_root: "."
